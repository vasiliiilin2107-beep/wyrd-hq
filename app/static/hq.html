<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WYRD — HQ</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2e7d32">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="WYRD HQ">
  <link rel="apple-touch-icon" href="/assets/icons/icon.svg">
  <link rel="stylesheet" href="/assets/css/wyrd.css">
  <link rel="stylesheet" href="/assets/css/mobile.css">
<style>
.map-loading{color:var(--text-dim);font-size:.7rem;padding:20px 0}
.wmap-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.wmap-title{font-size:.62rem;letter-spacing:.2em;color:var(--text-dim);font-weight:600;text-transform:uppercase}
.wmap-refresh{background:none;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-size:.8rem;padding:3px 10px;border-radius:6px;transition:all .15s}
.wmap-refresh:hover{border-color:var(--gold);color:var(--gold)}
.wmap{display:flex;flex-direction:column}
.wml{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--lc,#fff);border-radius:var(--radius)}
.wml-h{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;transition:background .2s}
.wml-h:hover{background:rgba(255,255,255,.05)}
.wml-left{display:flex;align-items:center;gap:12px}
.wml-ic{font-size:1.15rem;width:24px;text-align:center}
.wml-name{font-size:.7rem;font-weight:700;letter-spacing:.14em;margin-bottom:2px}
.wml-sub{font-size:.57rem;color:var(--text-dim)}
.wml-right{display:flex;align-items:center;gap:8px}
.wml-tag{font-size:.57rem;letter-spacing:.07em;padding:2px 8px;border:1px solid;border-radius:12px;opacity:.85;white-space:nowrap}
.wml-arr{color:var(--text-dim);font-size:.58rem;margin-left:2px}
.wml-body{padding:10px 16px 14px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.wml-nf{font-size:.63rem;color:var(--text-dim)}
.wml-flag{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:4px 9px;font-size:.63rem;max-width:280px}
.wml-ft{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wml-fdel{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:.7rem;padding:0 2px;line-height:1;transition:color .15s}
.wml-fdel:hover{color:#ef4444}
.wml-addf{display:flex;align-items:center;gap:6px;flex-wrap:wrap;width:100%;margin-top:2px}
.wml-sel,.wml-fin{background:rgba(0,0,0,.5);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:.64rem;padding:4px 8px;border-radius:6px;outline:none}
.wml-fin{flex:1;min-width:140px}.wml-fin:focus,.wml-sel:focus{border-color:rgba(255,255,255,.25)}
.wml-fbtn{background:none;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-size:.7rem;padding:3px 10px;border-radius:6px;transition:all .15s}
.wml-fbtn:hover{border-color:#f59e0b;color:#f59e0b}
.wml-fcancel:hover{border-color:#ef4444!important;color:#ef4444!important}
.wml-plus{background:none;border:1px dashed var(--border);color:var(--text-dim);cursor:pointer;font-size:.6rem;padding:3px 12px;border-radius:6px;letter-spacing:.1em;transition:all .15s;white-space:nowrap;margin-top:2px}
.wml-plus:hover{border-color:var(--gold);color:var(--gold)}
.wmc{display:flex;justify-content:center;height:16px;align-items:center;padding:0 20px}
.wmc-l{width:1px;height:100%;border-left:1px dashed;opacity:.6}
.wml-fexp{color:var(--text-dim);font-size:.55rem;margin:0 2px;cursor:pointer;flex-shrink:0}
.wml-flag-bd{width:100%;margin-top:5px;font-size:.62rem;color:var(--text-dim);line-height:1.5;padding-top:5px;border-top:1px solid var(--border);white-space:pre-wrap;word-break:break-word}
.wml-flag{cursor:pointer;flex-wrap:wrap}
.wml-flag-static{cursor:default}
/* ─── TECHNIK ───────────────────────────────────────── */
.tech-form{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.tech-fin{background:rgba(0,0,0,.5);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:.64rem;padding:5px 9px;border-radius:6px;outline:none;width:100%}
.tech-fin:focus{border-color:rgba(255,255,255,.25)}
.tech-fdesc{resize:vertical;min-height:40px}
.tech-list{display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.tech-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;display:flex;flex-direction:column;gap:5px}
.tech-row-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tech-badge{font-size:.55rem;letter-spacing:.08em;padding:2px 7px;border:1px solid;border-radius:10px;white-space:nowrap;font-weight:600}
.tech-pri{font-size:.58rem;color:var(--text-dim);background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:4px;padding:1px 6px;min-width:22px;text-align:center}
.tech-title{font-size:.68rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tech-ago{font-size:.57rem;color:var(--text-dim);white-space:nowrap;margin-left:auto}
.tech-desc{font-size:.62rem;color:var(--text-dim);line-height:1.5;padding-left:2px}
.tech-result{font-size:.62rem;color:var(--text-dim);background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:6px;padding:8px 10px;white-space:pre-wrap;word-break:break-word;line-height:1.5;max-height:200px;overflow-y:auto;margin-top:2px}
.tech-toggle{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:.6rem;padding:2px 0;text-align:left;letter-spacing:.05em}
.tech-toggle:hover{color:var(--gold)}
/* ─── IDEAS ─────────────────────────────────────────── */
.ideas-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.ideas-filters{display:flex;gap:6px;flex-wrap:wrap}
.idea-filter{background:none;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-size:.6rem;padding:4px 10px;border-radius:20px;letter-spacing:.1em;transition:all .15s}
.idea-filter.active,.idea-filter:hover{border-color:var(--gold);color:var(--gold)}
#ideas-list{display:flex;flex-direction:column;gap:10px;overflow-y:auto}
.idea-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;flex-direction:column;gap:8px;transition:border-color .2s}
.idea-card:hover{border-color:rgba(255,255,255,.14)}
.idea-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.idea-badge{font-size:.55rem;letter-spacing:.08em;padding:2px 8px;border:1px solid;border-radius:12px;white-space:nowrap;font-weight:600}
.idea-source{font-size:.55rem;color:var(--text-dim);background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;padding:2px 7px}
.idea-time{font-size:.55rem;color:var(--text-dim);margin-left:auto}
.idea-title{font-size:.75rem;font-weight:600;line-height:1.4}
.idea-desc{font-size:.63rem;color:var(--text-dim);line-height:1.5}
.idea-rev{font-size:.63rem;color:var(--green)}
.idea-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.idea-actions-sm{margin-top:2px}
.idea-btn{border:none;cursor:pointer;font-size:.65rem;font-family:inherit;padding:7px 16px;border-radius:8px;font-weight:600;letter-spacing:.08em;transition:all .15s}
.idea-btn-yes{background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.3)}
.idea-btn-yes:hover{background:rgba(16,185,129,.28);border-color:#10b981}
.idea-btn-no{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.idea-btn-no:hover{background:rgba(239,68,68,.24);border-color:#ef4444}
.idea-btn-ghost{background:rgba(255,255,255,.05);color:var(--text-dim);border:1px solid var(--border)}
.idea-btn-ghost:hover{border-color:rgba(255,255,255,.25);color:var(--text)}
.idea-btn-del{background:none;color:var(--text-dim);border:1px solid var(--border);padding:7px 10px}
.idea-btn-del:hover{border-color:#ef4444;color:#ef4444}
@keyframes idea-flash-green{0%{background:rgba(16,185,129,.22)}100%{background:var(--surface)}}
@keyframes idea-flash-red{0%{background:rgba(239,68,68,.18)}100%{background:var(--surface)}}
.idea-flash-green{animation:idea-flash-green .42s ease-out forwards}
.idea-flash-red{animation:idea-flash-red .42s ease-out forwards}
/* ─── 🏔️ АЛЬПИЙСКИЙ ЛУГ v4 ─────────────────────────── */
:root{--bg:#4a8a3a;--bg2:#3e7a2e;--surface:rgba(255,255,255,.82);--border:rgba(255,255,255,.50);--text:#1a3a15;--text-dim:rgba(30,70,20,.65);--gold:#2e7d32}
body{background:url('https://avatars.mds.yandex.net/get-shedevrum/15236108/img_9d17dae1258011f0839cb633c76826bc/orig') 50% 60%/cover fixed no-repeat!important}
#starfield{display:none}
.topbar{background:rgba(255,255,255,.22)!important;border-bottom-color:rgba(255,255,255,.28)!important;backdrop-filter:blur(22px)!important}
.topbar-logo{color:#1a5c10!important;text-shadow:none!important}
#tab-label,.topbar-status{color:rgba(15,65,8,.90)!important}
.topbar-time{color:rgba(25,75,12,.70)!important}
.sidebar{background:rgba(255,255,255,.20)!important;border-right-color:rgba(255,255,255,.25)!important;backdrop-filter:blur(18px)!important}
.nav-btn{color:rgba(15,65,8,.65)!important}
.nav-btn:hover,.nav-btn.active{background:rgba(255,255,255,.38)!important;color:#1a5c10!important}
.feed{background:rgba(255,255,255,.20)!important;border-left-color:rgba(255,255,255,.22)!important;backdrop-filter:blur(14px)!important}
.feed-branch,.feed-payload,.feed-time,.feed .section-title{color:rgba(15,65,8,.65)!important}
.feed-item{border-bottom-color:rgba(0,0,0,.08)!important}
.section-title{color:rgba(15,60,8,.68)!important}
.idea-card,.note-item,.task-card,.tech-row,.kanban-col{background:rgba(255,255,255,.88)!important;border-color:rgba(255,255,255,.85)!important;box-shadow:0 8px 32px rgba(5,40,2,.22),0 2px 8px rgba(5,40,2,.14)!important;backdrop-filter:blur(6px)!important}
.tech-fin,.note-textarea,.task-input,.wml-sel,.wml-fin{background:rgba(255,255,255,.75)!important;color:#1a3a15!important}
.kanban-add-form{background:rgba(255,255,255,.38)!important}
.tech-result{background:rgba(235,255,228,.88)!important;color:#2a5a20!important}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.18)!important}
</style>
</head>
<body>
  <canvas id="starfield"></canvas>

  <div class="hq-layout">
    <!-- Топбар -->
    <header class="topbar">
      <a href="/" class="topbar-logo">WYRD</a>
      <span style="font-size:.7rem;color:var(--text-dim);letter-spacing:.15em">/ HQ</span>
      <div class="topbar-sep"></div>
      <div class="topbar-status">
        <span class="dot"></span>
        <span id="tab-label">КАРТА МИРА</span>
      </div>
      <div class="topbar-time" id="clock">--:--:-- МСК</div>
    </header>

    <!-- Сайдбар -->
    <nav class="sidebar">
      <button class="nav-btn active" title="Карта" data-tab="map" onclick="setTab('map',this)">🗺️</button>
      <button class="nav-btn" title="Заметки" data-tab="notes" onclick="setTab('notes',this)">📝</button>
      <button class="nav-btn" title="Задачи" data-tab="tasks" onclick="setTab('tasks',this)">✅</button>
      <button class="nav-btn" title="Стройка" data-tab="build" onclick="setTab('build',this)">🏗️</button>
      <button class="nav-btn" title="Техник" data-tab="technik" onclick="setTab('technik',this)">🔧</button>
      <button class="nav-btn" title="Идеи" data-tab="ideas" onclick="setTab('ideas',this)">💡</button>
      <button class="nav-btn" title="Томас" onclick="window.location='/thomas'">👁️</button>
      <div style="flex:1"></div>
      <button class="nav-btn" title="На главную" onclick="window.location='/'">🪐</button>
    </nav>

    <!-- Главная область -->
    <main class="main-area">

      <!-- ─── TAB: MAP ─────────────────────────────────── -->
      <div id="tab-map" class="tab-panel">
        <div id="world-map"><div class="map-loading">Загрузка карты...</div></div>
      </div>

      <!-- ─── TAB: NOTES ────────────────────────────────── -->
      <div id="tab-notes" class="tab-panel" style="display:none">
        <div class="section-title">ЗАМЕТКИ</div>
        <div class="note-form">
          <textarea id="note-input" class="note-textarea" placeholder="Новая заметка..."></textarea>
          <button class="wyrd-btn" onclick="addNote()">+ ДОБАВИТЬ</button>
        </div>
        <div id="notes-list" class="notes-list">
          <div style="color:var(--text-dim);font-size:.7rem">Загрузка...</div>
        </div>
      </div>

      <!-- ─── TAB: TASKS ────────────────────────────────── -->
      <div id="tab-tasks" class="tab-panel" style="display:none">
        <div class="section-title">ДОСКА ЗАДАЧ</div>
        <div class="kanban-board">
          <!-- TODO -->
          <div class="kanban-col" data-status="todo">
            <div class="kanban-col-header">
              <span class="kanban-col-title todo-color">TODO</span>
              <button class="kanban-add-btn" onclick="showTaskInput('todo')" title="Добавить">+</button>
            </div>
            <div class="kanban-add-form" id="add-form-todo" style="display:none">
              <input class="task-input" id="task-input-todo" placeholder="Название задачи..." onkeydown="taskInputKey(event,'todo')">
              <div style="display:flex;gap:6px;margin-top:6px">
                <button class="wyrd-btn wyrd-btn-sm" onclick="addTask('todo')">ОК</button>
                <button class="wyrd-btn wyrd-btn-sm wyrd-btn-ghost" onclick="hideTaskInput('todo')">✕</button>
              </div>
            </div>
            <div class="kanban-cards" id="cards-todo"></div>
          </div>
          <!-- IN PROGRESS -->
          <div class="kanban-col" data-status="in_progress">
            <div class="kanban-col-header">
              <span class="kanban-col-title inprogress-color">В РАБОТЕ</span>
              <button class="kanban-add-btn" onclick="showTaskInput('in_progress')" title="Добавить">+</button>
            </div>
            <div class="kanban-add-form" id="add-form-in_progress" style="display:none">
              <input class="task-input" id="task-input-in_progress" placeholder="Название задачи..." onkeydown="taskInputKey(event,'in_progress')">
              <div style="display:flex;gap:6px;margin-top:6px">
                <button class="wyrd-btn wyrd-btn-sm" onclick="addTask('in_progress')">ОК</button>
                <button class="wyrd-btn wyrd-btn-sm wyrd-btn-ghost" onclick="hideTaskInput('in_progress')">✕</button>
              </div>
            </div>
            <div class="kanban-cards" id="cards-in_progress"></div>
          </div>
          <!-- DONE -->
          <div class="kanban-col" data-status="done">
            <div class="kanban-col-header">
              <span class="kanban-col-title done-color">ГОТОВО</span>
              <button class="kanban-add-btn" onclick="showTaskInput('done')" title="Добавить">+</button>
            </div>
            <div class="kanban-add-form" id="add-form-done" style="display:none">
              <input class="task-input" id="task-input-done" placeholder="Название задачи..." onkeydown="taskInputKey(event,'done')">
              <div style="display:flex;gap:6px;margin-top:6px">
                <button class="wyrd-btn wyrd-btn-sm" onclick="addTask('done')">ОК</button>
                <button class="wyrd-btn wyrd-btn-sm wyrd-btn-ghost" onclick="hideTaskInput('done')">✕</button>
              </div>
            </div>
            <div class="kanban-cards" id="cards-done"></div>
          </div>
        </div>
      </div>

      <!-- ─── TAB: BUILD ────────────────────────────────── -->
      <div id="tab-build" class="tab-panel" style="display:none">
        <div class="section-title">СТРОЙКА</div>
        <div style="color:var(--text-dim);font-size:.75rem;margin-top:20px;line-height:1.8">
          Здесь будет роадмап строительства мира.<br>
          Фазы, сессии, статусы задач из <code>HQ_BUILD_PLAN.md</code>.
        </div>
      </div>

      <!-- ─── TAB: TECHNIK ─────────────────────────────── -->
      <div id="tab-technik" class="tab-panel" style="display:none">
        <div class="section-title">ТЕХНИК — ОЧЕРЕДЬ ЗАДАЧ</div>

        <!-- Форма создания задачи -->
        <div class="tech-form">
          <input id="tech-input-title" class="tech-fin" placeholder="Название задачи..." onkeydown="if(event.key==='Enter')createTechTask()">
          <textarea id="tech-input-desc" class="tech-fin tech-fdesc" placeholder="Описание (опционально)..." rows="2"></textarea>
          <div style="display:flex;align-items:center;gap:10px">
            <label style="font-size:.62rem;color:var(--text-dim)">Приоритет:</label>
            <input id="tech-input-prio" type="number" min="1" max="10" value="5" class="tech-fin" style="width:60px">
            <button id="tech-create-btn" class="wyrd-btn wyrd-btn-sm" onclick="createTechTask()">+ ЗАДАЧА</button>
            <select id="tech-filter" class="tech-fin" style="margin-left:auto;width:140px" onchange="techFilterChange()">
              <option value="all">Все</option>
              <option value="pending">Ждёт</option>
              <option value="running">Работает</option>
              <option value="waiting_approval">Одобрение</option>
              <option value="done">Готово</option>
              <option value="failed">Ошибка</option>
            </select>
            <button class="wmap-refresh" onclick="loadTechTasks()">↻</button>
          </div>
        </div>

        <div id="tech-list" class="tech-list">
          <div style="color:var(--text-dim);font-size:.7rem">Загрузка...</div>
        </div>
      </div>

      <!-- ─── TAB: IDEAS ─────────────────────────────────── -->
      <div id="tab-ideas" class="tab-panel" style="display:none">
        <div class="section-title">ИДЕИ</div>
        <div class="ideas-toolbar">
          <div class="ideas-filters">
            <button class="idea-filter active" onclick="ideasFilterClick(this,'all')">ВСЕ</button>
            <button class="idea-filter" onclick="ideasFilterClick(this,'idea')">НОВЫЕ</button>
            <button class="idea-filter" onclick="ideasFilterClick(this,'testing')">В РАБОТЕ</button>
            <button class="idea-filter" onclick="ideasFilterClick(this,'archived')">АРХИВ</button>
          </div>
          <button class="wmap-refresh" onclick="loadIdeas()">↻</button>
        </div>
        <div id="ideas-list"></div>
      </div>

    </main>

    <!-- Лента событий -->
    <aside class="feed">
      <div class="section-title" style="margin-bottom:16px">СОБЫТИЯ</div>
      <div id="event-feed">
        <div style="color:var(--text-dim);font-size:.65rem">Загрузка...</div>
      </div>
    </aside>
  </div>

  <script src="/assets/js/hq.js"></script>
  <script src="/assets/js/map.js"></script>
  <script src="/assets/js/technik.js"></script>
  <script src="/assets/js/ideas.js"></script>
</body>
</html>
