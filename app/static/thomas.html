<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WYRD — ТОМАС</title>
  <link rel="stylesheet" href="/assets/css/wyrd.css">
  <style>
    .thomas-layout {
      display: grid;
      grid-template-columns: 56px 1fr 420px;
      grid-template-rows: 52px 1fr;
      height: 100vh;
      width: 100vw;
      position: relative;
      z-index: 1;
    }
    .chat-panel {
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: rgba(5,5,15,0.4);
      overflow: hidden;
    }
    .chat-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(59,130,246,0.06);
    }
    .chat-header-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--blue);
    }
    .chat-iframe {
      flex: 1;
      border: none;
      background: transparent;
    }

    /* Статус-карточки */
    .thomas-stat {
      background: rgba(10,10,30,0.7);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 160px;
    }
    .thomas-stat-label {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .thomas-stat-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
    }
    .thomas-stat-sub {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .pulse-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
      margin-right: 6px;
      flex-shrink: 0;
    }
    .pulse-dot.alive { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
    .pulse-dot.warn  { background: #ffaa00; box-shadow: 0 0 6px #ffaa00; }

    /* Лента мыслей */
    .thought-item {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .thought-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .thought-type {
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .t-patrol  { background: rgba(59,130,246,0.2);  color: #60a5fa; }
    .t-idea    { background: rgba(16,185,129,0.2);  color: #34d399; }
    .t-council { background: rgba(139,92,246,0.2);  color: #a78bfa; }
    .t-risk    { background: rgba(239,68,68,0.2);   color: #f87171; }
    .t-ok      { background: rgba(16,185,129,0.15); color: #6ee7b7; }
    .thought-time {
      font-size: 0.6rem;
      color: var(--text-dim);
      margin-left: auto;
    }
    .thought-body {
      font-size: 0.72rem;
      color: #c8d0e0;
      line-height: 1.5;
    }
    .thought-body strong { color: #fff; }

    /* Council sessions */
    .council-item {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .council-topic {
      font-size: 0.72rem;
      color: #c8d0e0;
      margin-bottom: 4px;
    }
    .council-verdict {
      font-size: 0.65rem;
      color: var(--text-dim);
      line-height: 1.4;
    }
    .status-badge {
      font-size: 0.6rem;
      padding: 1px 6px;
      border-radius: 3px;
      display: inline-block;
    }
    .sb-verdict  { background: rgba(139,92,246,0.2); color: #a78bfa; }
    .sb-thinking { background: rgba(251,191,36,0.2);  color: #fcd34d; }
    .sb-error    { background: rgba(239,68,68,0.2);   color: #f87171; }

    .empty-hint {
      color: var(--text-dim);
      font-size: 0.65rem;
      padding: 12px 0;
    }
  </style>
</head>
<body>
  <canvas id="starfield"></canvas>

  <div class="thomas-layout">
    <!-- Топбар -->
    <header class="topbar">
      <a href="/" class="topbar-logo">WYRD</a>
      <span style="font-size:.7rem;color:var(--text-dim);letter-spacing:.15em">/ ТОМАС</span>
      <div class="topbar-sep"></div>
      <div class="topbar-status" id="topbar-status">
        <span class="dot" style="background:#555"></span>
        <span style="color:var(--text-dim)">ЗАГРУЗКА...</span>
      </div>
      <div class="topbar-time" id="clock">--:--:-- МСК</div>
    </header>

    <!-- Сайдбар -->
    <nav class="sidebar">
      <button class="nav-btn active" title="Обзор">📋</button>
      <div style="flex:1"></div>
      <button class="nav-btn" title="HQ" onclick="window.location='/hq'">🏛️</button>
      <button class="nav-btn" title="На главную" onclick="window.location='/'">🪐</button>
    </nav>

    <!-- Главная область -->
    <main class="main-area" style="overflow-y:auto">

      <!-- Статус строка -->
      <div>
        <div class="section-title">СТАТУС ТОМАСА</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap" id="status-cards">
          <div class="thomas-stat">
            <div class="thomas-stat-label">Пульс</div>
            <div class="thomas-stat-value" id="stat-pulse" style="display:flex;align-items:center">
              <span class="pulse-dot" id="pulse-dot"></span>
              <span id="pulse-ago">—</span>
            </div>
            <div class="thomas-stat-sub" id="stat-task">—</div>
          </div>
          <div class="thomas-stat">
            <div class="thomas-stat-label">Патрули (последний)</div>
            <div class="thomas-stat-value" id="stat-patrol-time">—</div>
            <div class="thomas-stat-sub" id="stat-patrol-count">0 за всё время</div>
          </div>
          <div class="thomas-stat">
            <div class="thomas-stat-label">Сессии Совета</div>
            <div class="thomas-stat-value" id="stat-council">—</div>
            <div class="thomas-stat-sub" id="stat-council-sub">всего запущено</div>
          </div>
          <div class="thomas-stat">
            <div class="thomas-stat-label">Идеи сегодня</div>
            <div class="thomas-stat-value" id="stat-ideas">—</div>
            <div class="thomas-stat-sub">thomas_think</div>
          </div>
        </div>
      </div>

      <!-- Мысли Томаса -->
      <div style="margin-top:20px">
        <div class="section-title">МЫСЛИ И ДЕЙСТВИЯ</div>
        <div id="thoughts-feed">
          <div class="empty-hint">Загрузка...</div>
        </div>
      </div>

      <!-- Сессии Совета -->
      <div style="margin-top:20px">
        <div class="section-title">ПОСЛЕДНИЕ СЕССИИ СОВЕТА</div>
        <div id="council-feed">
          <div class="empty-hint">Загрузка...</div>
        </div>
      </div>

    </main>

    <!-- Чат Томаса -->
    <div class="chat-panel">
      <div class="chat-header">
        <span class="dot" style="background:var(--blue);box-shadow:0 0 6px var(--blue)"></span>
        <span class="chat-header-title">ЧАТ С ТОМАСОМ</span>
      </div>
      <iframe
        class="chat-iframe"
        src="http://nliab2x9c4i45glpqn3mdcy0.147.45.212.155.sslip.io"
        title="Томас веб-чат"
        sandbox="allow-scripts allow-same-origin allow-forms"
      ></iframe>
    </div>
  </div>

  <script src="/assets/js/hq.js"></script>
  <script>
    // ── Helpers ────────────────────────────────────────────────────────────────

    function fmtTime(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      const today = new Date();
      if (d.toDateString() === today.toDateString()) return 'сегодня ' + fmtTime(iso);
      return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' }) + ' ' + fmtTime(iso);
    }

    // ── Пульс ─────────────────────────────────────────────────────────────────

    async function loadPulse() {
      try {
        const r = await fetch('/civilization/agents');
        const data = await r.json();
        const thomas = (data.agents || []).find(a => a.name === 'thomas');
        if (!thomas) return;

        const dot = document.getElementById('pulse-dot');
        const ago = document.getElementById('pulse-ago');
        const task = document.getElementById('stat-task');
        const topbar = document.getElementById('topbar-status');

        const pAgo = thomas.pulse_ago;
        const isAlive = thomas.last_pulse && (Date.now() - new Date(thomas.last_pulse + 'Z').getTime()) < 20 * 60 * 1000;

        dot.className = 'pulse-dot ' + (isAlive ? 'alive' : 'warn');
        ago.textContent = pAgo || 'нет данных';
        task.textContent = thomas.current_task || 'задача не указана';

        topbar.innerHTML = isAlive
          ? '<span class="dot" style="background:#00ff88;box-shadow:0 0 6px #00ff88"></span><span style="color:#00ff88">СТРАЖ АКТИВЕН</span>'
          : '<span class="dot" style="background:#ffaa00;box-shadow:0 0 6px #ffaa00"></span><span style="color:#ffaa00">СТРАЖ МОЛЧИТ</span>';
      } catch(e) {}
    }

    // ── События Томаса ────────────────────────────────────────────────────────

    const TYPE_MAP = {
      'thomas_patrol': { cls: 't-patrol', label: 'Патруль', key: 'summary' },
      'thomas_idea':   { cls: 't-idea',   label: 'Идея',    key: 'title'   },
      'thomas_risk':   { cls: 't-risk',   label: 'Риск',    key: 'title'   },
      'thomas_ok':     { cls: 't-ok',     label: 'ОК',      key: 'summary' },
    };

    async function loadThoughts() {
      const feed = document.getElementById('thoughts-feed');
      try {
        const r = await fetch('/events?limit=200');
        const data = await r.json();
        const all = Array.isArray(data) ? data : (data.events || []);

        // Фильтр — только события Томаса
        const thomas_events = all.filter(e => e.type && e.type.startsWith('thomas_'));

        // Статистика патрулей
        const patrols = thomas_events.filter(e => e.type === 'thomas_patrol');
        document.getElementById('stat-patrol-count').textContent = patrols.length + ' патрулей';
        if (patrols.length) {
          document.getElementById('stat-patrol-time').textContent = fmtDate(patrols[0].created_at);
        }

        // Идеи
        const ideas = thomas_events.filter(e => e.type === 'thomas_idea');
        const today = new Date().toDateString();
        const ideasToday = ideas.filter(e => new Date(e.created_at).toDateString() === today);
        document.getElementById('stat-ideas').textContent = ideasToday.length || ideas.length;

        feed.innerHTML = '';
        if (!thomas_events.length) {
          feed.innerHTML = '<div class="empty-hint">Томас ещё не записал ни одной мысли</div>';
          return;
        }

        thomas_events.forEach(e => {
          const meta = TYPE_MAP[e.type] || { cls: 't-patrol', label: e.type, key: 'summary' };
          const p = e.payload || {};
          const text = p[meta.key] || p.summary || p.title || p.body || JSON.stringify(p).slice(0, 200);

          const item = document.createElement('div');
          item.className = 'thought-item';
          item.innerHTML = `
            <div class="thought-meta">
              <span class="thought-type ${meta.cls}">${meta.label}</span>
              <span class="thought-time">${fmtDate(e.created_at)}</span>
            </div>
            <div class="thought-body">${text}</div>
          `;
          feed.appendChild(item);
        });
      } catch(e) {
        feed.innerHTML = '<div class="empty-hint">Нет данных</div>';
      }
    }

    // ── Сессии Совета ─────────────────────────────────────────────────────────

    async function loadCouncil() {
      const feed = document.getElementById('council-feed');
      const stat = document.getElementById('stat-council');
      try {
        const r = await fetch('/council/sessions?limit=10');
        const data = await r.json();
        const sessions = data.sessions || data || [];
        stat.textContent = sessions.length;

        feed.innerHTML = '';
        if (!sessions.length) {
          feed.innerHTML = '<div class="empty-hint">Совет ещё не собирался</div>';
          return;
        }

        sessions.forEach(s => {
          const statusMap = {
            verdict: { cls: 'sb-verdict', label: 'Вердикт' },
            thinking: { cls: 'sb-thinking', label: 'Думает' },
            error: { cls: 'sb-error', label: 'Ошибка' },
          };
          const st = statusMap[s.status] || { cls: 'sb-thinking', label: s.status };
          const verdict = s.verdict ? (s.verdict.thomas_brief || s.verdict.summary || '') : '';
          const briefSnippet = verdict.slice(0, 220);

          const item = document.createElement('div');
          item.className = 'council-item';
          item.innerHTML = `
            <div class="thought-meta" style="margin-bottom:6px">
              <span class="status-badge ${st.cls}">${st.label}</span>
              <span class="thought-time">${fmtDate(s.created_at)}</span>
            </div>
            <div class="council-topic">${(s.idea_text || '').slice(0, 120)}</div>
            ${briefSnippet ? `<div class="council-verdict">${briefSnippet}${verdict.length > 220 ? '…' : ''}</div>` : ''}
          `;
          feed.appendChild(item);
        });
      } catch(e) {
        feed.innerHTML = '<div class="empty-hint">Нет данных</div>';
      }
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    async function refresh() {
      await Promise.all([loadPulse(), loadThoughts(), loadCouncil()]);
    }

    document.addEventListener('DOMContentLoaded', refresh);
    setInterval(refresh, 20000);
  </script>
</body>
</html>
