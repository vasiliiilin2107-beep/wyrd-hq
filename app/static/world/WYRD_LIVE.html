<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WYRD Live Map</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#060a14; overflow:hidden; font-family:'Courier New',monospace; touch-action:none; }
#graph { display:block; width:100vw; height:100vh; }

/* Шапка */
#hdr { position:fixed; top:0; left:0; right:0; height:36px; background:#060a1acc;
  border-bottom:1px solid #4a9eff22; display:flex; align-items:center;
  padding:0 14px; gap:16px; z-index:20; backdrop-filter:blur(8px); }
#hdr-title { color:#4a9eff; font-size:9px; letter-spacing:4px; }
#status { color:#4aff8899; font-size:8px; letter-spacing:1px; flex:1; }
#online-count { color:#ffd700; font-size:9px; letter-spacing:2px; }

/* Навигация */
#nav { position:fixed; top:36px; left:50%; transform:translateX(-50%);
  display:flex; gap:20px; font-size:8px; letter-spacing:2px; z-index:10;
  background:#060a14aa; padding:5px 14px; border-radius:0 0 6px 6px; }
#nav a { color:#3a5a7a; text-decoration:none; transition:color .2s; }
#nav a:hover { color:#4a9eff; }
#nav a.active { color:#4a9eff; }

/* Tooltip */
#tooltip { position:fixed; background:#0d1525ee; border:1px solid #4a9eff55;
  color:#e0e8ff; font-size:10px; padding:8px 12px; border-radius:4px;
  pointer-events:none; display:none; max-width:230px; line-height:1.6;
  z-index:100; }

/* Легенда */
#legend { position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
  display:flex; gap:14px; font-size:8px; letter-spacing:1px;
  background:#060a14cc; padding:5px 12px; border-radius:4px;
  border:1px solid #ffffff11; }
.leg { display:flex; align-items:center; gap:5px; }
.leg-line { width:22px; height:2px; border-radius:2px; }

/* Zoom */
#zoom-btns { position:fixed; right:14px; bottom:50px; display:flex;
  flex-direction:column; gap:5px; z-index:30; }
.zbtn { background:rgba(10,20,40,.75); border:1px solid #4a9eff44;
  color:#4a9eff99; font-size:14px; width:30px; height:30px; border-radius:6px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(6px); transition:all .15s; }
.zbtn:hover { border-color:#4a9eff; color:#4a9eff; }

/* Node labels */
.node-emoji { font-size:13px; text-anchor:middle; dominant-baseline:central; pointer-events:none; }
.node-name  { font-size:7px; text-anchor:middle; letter-spacing:.5px; pointer-events:none; }
</style>
</head>
<body>
<div id="hdr">
  <span id="hdr-title">⬡ WYRD · ЖИВАЯ КАРТА</span>
  <span id="status">● подключение...</span>
  <span id="online-count">—</span>
</div>

<div id="nav">
  <a href="WYRD_MAP.html">▦ ЗДАНИЕ</a>
  <a href="WYRD_GRID.html">▣ СЕТКА</a>
  <a href="WYRD_AGENTS.html">✦ ПАУТИНА</a>
  <a href="WYRD_LIVE.html" class="active">⚡ ОНЛАЙН</a>
</div>

<svg id="graph"></svg>
<div id="tooltip"></div>

<div id="legend">
  <div class="leg"><div class="leg-line" style="background:#4aff88"></div><span style="color:#4aff88">знание</span></div>
  <div class="leg"><div class="leg-line" style="background:#ffaa00"></div><span style="color:#ffaa00">отчёт</span></div>
  <div class="leg"><div class="leg-line" style="background:#ff6b6b"></div><span style="color:#ff6b6b">инсайт→Совет</span></div>
  <div class="leg"><div class="leg-line" style="background:#06b6d4"></div><span style="color:#06b6d4">ТЗ→стройка</span></div>
  <div class="leg"><div class="leg-line" style="background:#4a9eff"></div><span style="color:#4a9eff">Томас</span></div>
  <div class="leg"><div class="leg-line" style="background:#4a9eff;opacity:.2;border-top:1px dashed #4a9eff"></div><span style="color:#555">нет сигнала</span></div>
</div>

<div id="zoom-btns">
  <button class="zbtn" onclick="zoomBy(1.3)">+</button>
  <button class="zbtn" onclick="zoomBy(0.77)">−</button>
  <button class="zbtn" onclick="zoomReset()">⊙</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="wyrd_live.js"></script>
<script>
function zoomBy(k) {
  d3.select('#graph').transition().call(
    d3.zoom().scaleBy, k
  );
}
function zoomReset() {
  d3.select('#graph').transition().call(
    d3.zoom().transform, d3.zoomIdentity
  );
}
</script>
</body>
</html>
