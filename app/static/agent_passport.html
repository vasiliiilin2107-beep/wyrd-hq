<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WYRD — Паспорт агента</title>
  <link rel="stylesheet" href="/assets/css/wyrd.css">
  <style>
    body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
    .pp-header{display:flex;align-items:center;gap:14px;padding:18px 24px;border-bottom:1px solid var(--border);background:rgba(10,10,30,.7)}
    .pp-back{background:none;border:1px solid var(--border);color:var(--text-dim);border-radius:6px;padding:5px 12px;cursor:pointer;font-size:.7rem;letter-spacing:.1em}
    .pp-back:hover{border-color:var(--blue);color:var(--blue)}
    .pp-emoji{font-size:2rem;line-height:1}
    .pp-title{font-size:1rem;font-weight:700;letter-spacing:.12em}
    .pp-sub{font-size:.65rem;color:var(--text-dim);letter-spacing:.1em;margin-top:3px;display:flex;align-items:center;gap:8px}
    .pp-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
    .pp-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 24px;background:rgba(8,8,20,.5)}
    .pp-tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--text-dim);padding:10px 18px;cursor:pointer;font-size:.65rem;letter-spacing:.12em;font-family:var(--font)}
    .pp-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
    .pp-body{padding:24px;max-width:860px}
    .pp-panel{display:none}.pp-panel.active{display:block}
    .pp-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
    .pp-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
    .pp-card-label{font-size:.58rem;color:var(--text-dim);letter-spacing:.15em;margin-bottom:6px}
    .pp-card-val{font-size:.8rem;color:var(--text)}
    .pp-knows{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
    .pp-tag{background:rgba(74,158,255,.1);border:1px solid rgba(74,158,255,.25);border-radius:4px;padding:2px 8px;font-size:.6rem;color:var(--blue)}
    textarea.pp-prompt{width:100%;min-height:260px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Courier New',monospace;font-size:.72rem;padding:14px;resize:vertical;line-height:1.6;box-sizing:border-box}
    textarea.pp-prompt:focus{outline:none;border-color:var(--blue)}
    .pp-prompt-meta{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
    .pp-ver{font-size:.62rem;color:var(--text-dim)}
    .pp-train-status{font-size:.62rem;padding:3px 10px;border-radius:4px;font-weight:600;letter-spacing:.08em}
    .ts-idle{background:rgba(107,114,128,.15);color:#9ca3af}
    .ts-queued{background:rgba(245,158,11,.15);color:#f59e0b}
    .ts-in_training{background:rgba(59,130,246,.15);color:var(--blue)}
    .ts-done{background:rgba(16,185,129,.15);color:#10b981}
    .pp-actions-row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
    .pp-btn{padding:8px 18px;border-radius:6px;border:none;cursor:pointer;font-size:.68rem;font-family:var(--font);font-weight:600;letter-spacing:.08em}
    .pp-btn-primary{background:var(--blue);color:#000}
    .pp-btn-primary:hover{opacity:.85}
    .pp-btn-secondary{background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--text)}
    .pp-btn-secondary:hover{border-color:var(--blue);color:var(--blue)}
    .pp-btn-train{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.4);color:#f59e0b}
    .pp-btn-train:hover{background:rgba(245,158,11,.25)}
    .pp-journal-filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
    .pp-flt{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:4px;padding:4px 12px;cursor:pointer;font-size:.62rem;color:var(--text-dim);font-family:var(--font)}
    .pp-flt.active{border-color:var(--blue);color:var(--blue)}
    .pp-jentry{border-left:3px solid var(--border);padding:8px 0 8px 14px;margin-bottom:12px}
    .pp-jentry-title{font-size:.75rem;font-weight:600}
    .pp-jentry-meta{font-size:.6rem;color:var(--text-dim);margin-top:3px}
    .pp-jentry-body{font-size:.7rem;color:var(--text-dim);margin-top:5px;white-space:pre-wrap}
    .j-update{border-color:#4a9eff}.j-error{border-color:#ef4444}.j-repair{border-color:#f59e0b}
    .j-downtime{border-color:#6b7280}.j-training{border-color:#10b981}
    .pp-add-entry{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:16px}
    .pp-add-entry select,.pp-add-entry input,.pp-add-entry textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:var(--font);font-size:.72rem;padding:7px 10px;margin-bottom:8px;box-sizing:border-box}
    .pp-add-entry select:focus,.pp-add-entry input:focus,.pp-add-entry textarea:focus{outline:none;border-color:var(--blue)}
    .pp-empty{color:var(--text-dim);font-size:.75rem;padding:20px 0}
  </style>
</head>
<body>
<div class="pp-header">
  <button class="pp-back" onclick="history.back()">← HQ</button>
  <span id="pp-emoji" class="pp-emoji">🤖</span>
  <div>
    <div id="pp-title" class="pp-title">Загрузка...</div>
    <div class="pp-sub">
      <span class="pp-dot" id="pp-dot"></span>
      <span id="pp-status-label"></span>
      <span id="pp-dept" style="opacity:.6"></span>
    </div>
  </div>
</div>
<div class="pp-tabs">
  <button class="pp-tab active" onclick="setTab('profile',this)">📋 ПРОФИЛЬ</button>
  <button class="pp-tab" onclick="setTab('prompt',this)">📝 ПРОМПТ</button>
  <button class="pp-tab" onclick="setTab('journal',this)">📒 ЖУРНАЛ</button>
</div>
<div class="pp-body">
  <div id="tab-profile" class="pp-panel active">
    <div class="pp-grid" id="profile-grid"></div>
    <div id="profile-knows"></div>
  </div>
  <div id="tab-prompt" class="pp-panel">
    <div class="pp-prompt-meta">
      <span class="pp-ver" id="prompt-ver">—</span>
      <span class="pp-train-status ts-idle" id="prompt-train-status">IDLE</span>
      <span class="pp-ver" id="prompt-trained-at"></span>
    </div>
    <textarea class="pp-prompt" id="prompt-text" placeholder="Промпт агента пока не зарегистрирован. Вставь сюда системный промпт."></textarea>
    <div id="prompt-notes-wrap" style="margin-top:8px">
      <input id="prompt-notes" style="width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:var(--font);font-size:.7rem;padding:7px 10px;box-sizing:border-box" placeholder="Заметка к версии (что изменилось)">
    </div>
    <div class="pp-actions-row">
      <button class="pp-btn pp-btn-primary" onclick="savePrompt()">💾 Сохранить промпт</button>
      <button class="pp-btn pp-btn-train" id="train-btn" onclick="sendToTraining()">🎓 Отправить на обучение</button>
    </div>
    <div id="prompt-feedback" style="margin-top:10px;font-size:.68rem;color:var(--text-dim)"></div>
  </div>
  <div id="tab-journal" class="pp-panel">
    <div class="pp-journal-filters">
      <button class="pp-flt active" onclick="filterJournal('',this)">ВСЕ</button>
      <button class="pp-flt" onclick="filterJournal('update',this)">📝 ОБНОВЛЕНИЯ</button>
      <button class="pp-flt" onclick="filterJournal('training',this)">🎓 ОБУЧЕНИЕ</button>
      <button class="pp-flt" onclick="filterJournal('error',this)">🔴 ОШИБКИ</button>
      <button class="pp-flt" onclick="filterJournal('repair',this)">🔧 РЕМОНТЫ</button>
      <button class="pp-flt" onclick="filterJournal('downtime',this)">⏸ ПРОСТОИ</button>
    </div>
    <div id="journal-list"></div>
    <div class="pp-add-entry">
      <div style="font-size:.6rem;color:var(--text-dim);letter-spacing:.12em;margin-bottom:8px">ДОБАВИТЬ ЗАПИСЬ</div>
      <select id="j-type"><option value="update">📝 Обновление</option><option value="error">🔴 Ошибка</option><option value="repair">🔧 Ремонт</option><option value="downtime">⏸ Простой</option></select>
      <input id="j-title" placeholder="Заголовок записи">
      <textarea id="j-body" style="min-height:60px" placeholder="Детали (опционально)"></textarea>
      <button class="pp-btn pp-btn-secondary" onclick="addJournalEntry()">+ Добавить</button>
    </div>
  </div>
</div>
<script>
const AGENT_NAME = decodeURIComponent(location.pathname.split('/agent/')[1] || '');
const SC = {live:'#10b981',pause:'#f59e0b',ready:'#3b82f6',ghost:'#6b7280',active:'#10b981',idle:'#f59e0b',offline:'#ef4444',pending:'#f97316'};
const SL = {live:'LIVE',pause:'ПАУЗА',ready:'ГОТОВ',ghost:'НЕ СОЗДАН',active:'LIVE',idle:'ОЖИДАЕТ',offline:'ОФЛАЙН',pending:'СТРОИТСЯ'};
const EMOJIS = {thomas:'🎙',technik:'🔧',scribe:'🌍',library:'📖',studio:'🎬',professor:'🎓',strateg:'🧠',arhitektor:'📐',kartograf:'🗺',kaznachey:'💰',tomas:'🎙'};

function setTab(name,btn){
  document.querySelectorAll('.pp-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.pp-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='journal') loadJournal('');
}

function ago(iso){
  if(!iso) return '';
  const d=Math.floor((Date.now()-new Date(iso))/1000);
  if(d<60) return `${d} с назад`;
  if(d<3600) return `${Math.floor(d/60)} мин назад`;
  if(d<86400) return `${Math.floor(d/3600)} ч назад`;
  return `${Math.floor(d/86400)} дн назад`;
}

async function loadProfile(){
  const [ar, pr] = await Promise.all([
    fetch(`/civilization/agents/${AGENT_NAME}`).then(r=>r.json()).catch(()=>null),
    fetch(`/civilization/passports`).then(r=>r.json()).catch(()=>({passports:[]}))
  ]);
  const passport = (pr.passports||[]).find(p=>p.agent_name===AGENT_NAME||p.agent_name===ar?.name);
  const agent = ar;
  if(!agent){document.getElementById('pp-title').textContent='Агент не найден';return;}
  document.getElementById('pp-title').textContent = AGENT_NAME.toUpperCase();
  document.getElementById('pp-emoji').textContent = EMOJIS[AGENT_NAME]||'🤖';
  const c = SC[agent.status]||'#6b7280';
  document.getElementById('pp-dot').style.cssText = `background:${c};box-shadow:0 0 6px ${c}`;
  document.getElementById('pp-status-label').textContent = SL[agent.status]||agent.status?.toUpperCase()||'—';
  document.getElementById('pp-dept').textContent = passport?.department||agent.branch||'—';
  const grid = [
    ['РОЛЬ', agent.role||'—'],['УРОВЕНЬ', agent.level||'—'],
    ['ВЕТКА', agent.branch||'—'],['СТАТУС', agent.status||'—'],
    ['БОСС', passport?.boss||'—'],['СПЕЦИАЛИЗАЦИЯ', passport?.specialization||'—'],
    ['ПОСЛЕДНИЙ ПУЛЬС', agent.pulse_ago||'—'],['ЗАРЕГИСТРИРОВАН', passport?.issued_at ? ago(passport.issued_at) : '—'],
  ];
  document.getElementById('profile-grid').innerHTML = grid.map(([l,v])=>
    `<div class="pp-card"><div class="pp-card-label">${l}</div><div class="pp-card-val">${v}</div></div>`
  ).join('');
  if(passport?.knows?.length){
    document.getElementById('profile-knows').innerHTML =
      `<div class="pp-card"><div class="pp-card-label">ЗНАЕТ / УМЕЕТ</div><div class="pp-knows">${
        passport.knows.map(k=>`<span class="pp-tag">${k}</span>`).join('')
      }</div></div>`;
  }
}

async function loadPrompt(){
  const d = await fetch(`/civilization/agents/${AGENT_NAME}/prompt`).then(r=>r.json()).catch(()=>null);
  if(!d) return;
  document.getElementById('prompt-text').value = d.prompt||'';
  document.getElementById('prompt-ver').textContent = `Версия: ${d.version||'v1.0'}`;
  document.getElementById('prompt-trained-at').textContent = d.last_trained_at ? `Обучен: ${ago(d.last_trained_at)}` : '';
  const ts = d.training_status||'idle';
  const el = document.getElementById('prompt-train-status');
  el.textContent = ts.toUpperCase().replace('_',' ');
  el.className = `pp-train-status ts-${ts}`;
  if(ts==='queued'||ts==='in_training') document.getElementById('train-btn').disabled=true;
}

async function savePrompt(){
  const prompt = document.getElementById('prompt-text').value.trim();
  if(!prompt){alert('Промпт пустой');return;}
  const notes = document.getElementById('prompt-notes').value.trim();
  const r = await fetch(`/civilization/agents/${AGENT_NAME}/prompt`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt,notes:notes||null})});
  const d = await r.json();
  document.getElementById('prompt-feedback').textContent = `✅ Сохранено (${d.version})`;
  document.getElementById('prompt-ver').textContent = `Версия: ${d.version}`;
  document.getElementById('prompt-notes').value='';
  setTimeout(()=>document.getElementById('prompt-feedback').textContent='',3000);
}

async function sendToTraining(){
  const btn = document.getElementById('train-btn');
  btn.disabled=true; btn.textContent='⏳ Отправляем...';
  const r = await fetch(`/civilization/agents/${AGENT_NAME}/train`,{method:'POST'});
  const d = await r.json();
  document.getElementById('prompt-feedback').textContent = `🎓 Задача #${d.task_id} создана. Профессор получил.`;
  document.getElementById('prompt-train-status').textContent='QUEUED';
  document.getElementById('prompt-train-status').className='pp-train-status ts-queued';
  setTimeout(()=>document.getElementById('prompt-feedback').textContent='',5000);
}

let _jFilter='';
async function loadJournal(type){
  _jFilter=type;
  const url=`/civilization/agents/${AGENT_NAME}/journal${type?'?entry_type='+type:''}`;
  const d = await fetch(url).then(r=>r.json()).catch(()=>({entries:[]}));
  const ICONS={update:'📝',error:'🔴',repair:'🔧',downtime:'⏸',training:'🎓'};
  const el=document.getElementById('journal-list');
  if(!d.entries?.length){el.innerHTML='<div class="pp-empty">Записей нет</div>';return;}
  el.innerHTML=d.entries.map(e=>`
    <div class="pp-jentry j-${e.entry_type}">
      <div class="pp-jentry-title">${ICONS[e.entry_type]||'•'} ${e.title}</div>
      <div class="pp-jentry-meta">${ago(e.created_at)} · ${e.created_by}</div>
      ${e.body?`<div class="pp-jentry-body">${e.body}</div>`:''}
    </div>`).join('');
}

function filterJournal(type,btn){
  document.querySelectorAll('.pp-flt').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadJournal(type);
}

async function addJournalEntry(){
  const type=document.getElementById('j-type').value;
  const title=document.getElementById('j-title').value.trim();
  const body=document.getElementById('j-body').value.trim();
  if(!title){alert('Заголовок обязателен');return;}
  await fetch(`/civilization/agents/${AGENT_NAME}/journal`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({entry_type:type,title,body:body||null})});
  document.getElementById('j-title').value='';
  document.getElementById('j-body').value='';
  loadJournal(_jFilter);
}

loadProfile();
loadPrompt();
</script>
</body>
</html>
