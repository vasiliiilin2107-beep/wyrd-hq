<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WYRD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #03030d;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      font-family: 'Space Grotesk', sans-serif;
    }

    /* ── СЛОИ ФОНА ── */
    #starfield {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    .nebula {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 55% at 15% 35%, rgba(88,28,220,0.13) 0%, transparent 65%),
        radial-gradient(ellipse 55% 65% at 85% 65%, rgba(15,50,160,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 80% 40% at 50% 90%, rgba(4,60,48,0.08) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 70% 20%, rgba(120,20,80,0.07) 0%, transparent 50%);
    }

    /* ── СЦЕНА ── */
    .scene {
      position: relative; z-index: 2;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; width: 100vw;
    }

    .solar {
      position: relative;
      width: 760px; height: 760px;
    }

    /* ── ОРБИТЫ ── */
    .orbit {
      position: absolute;
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      border: 1px solid rgba(255,255,255,0.055);
      box-shadow: 0 0 12px rgba(255,255,255,0.015) inset;
    }

    /* ── ЦЕНТР — СОЛНЦЕ ── */
    .sun {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      text-align: center;
      pointer-events: none;
      user-select: none;
    }

    /* Короны */
    .corona {
      position: absolute;
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .corona-1 {
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(245,158,11,0.18) 0%, rgba(245,158,11,0.06) 50%, transparent 70%);
      animation: corona-pulse 3s ease-in-out infinite;
    }
    .corona-2 {
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(245,158,11,0.07) 0%, transparent 65%);
      animation: corona-pulse 3s ease-in-out infinite 0.8s;
    }
    .corona-3 {
      width: 380px; height: 380px;
      background: radial-gradient(circle, rgba(245,158,11,0.03) 0%, transparent 60%);
      animation: corona-pulse 3s ease-in-out infinite 1.6s;
    }
    @keyframes corona-pulse {
      0%,100% { opacity: 0.7; transform: translate(-50%,-50%) scale(1); }
      50%      { opacity: 1;   transform: translate(-50%,-50%) scale(1.08); }
    }

    /* Кольцо вокруг солнца */
    .sun-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 1px solid rgba(245,158,11,0.3);
      animation: ring-spin 8s linear infinite;
      pointer-events: none;
    }
    .sun-ring::before {
      content: '';
      position: absolute;
      top: -3px; left: 50%;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(245,158,11,0.9);
      box-shadow: 0 0 8px rgba(245,158,11,1);
    }
    @keyframes ring-spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

    .wyrd-text {
      font-family: 'Orbitron', monospace;
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: 0.4em;
      background: linear-gradient(160deg, #fde68a 0%, #f59e0b 40%, #fbbf24 70%, #fff8e1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 24px rgba(245,158,11,0.7));
      animation: wyrd-glow 4s ease-in-out infinite;
    }
    @keyframes wyrd-glow {
      0%,100% { filter: drop-shadow(0 0 20px rgba(245,158,11,0.5)); }
      50%      { filter: drop-shadow(0 0 40px rgba(245,158,11,0.9)) drop-shadow(0 0 80px rgba(245,158,11,0.3)); }
    }

    .wyrd-sub {
      font-size: 0.55rem;
      letter-spacing: 0.5em;
      color: rgba(255,255,255,0.25);
      margin-top: 8px;
      font-weight: 300;
    }

    /* ── ПЛАНЕТЫ ── */
    .planet-wrap {
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      z-index: 10;
    }

    .planet-dot {
      position: absolute;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(.34,1.56,.64,1);
    }
    .planet-dot:hover { transform: translate(-50%,-50%) scale(1.5); }
    .planet-dot.inactive {
      cursor: default;
      opacity: 0.25;
      filter: grayscale(0.6);
    }
    .planet-dot.inactive:hover { transform: translate(-50%,-50%) scale(1); }

    /* Внешнее кольцо активной планеты */
    .planet-ring {
      position: absolute;
      border-radius: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none;
      border: 1px solid currentColor;
      opacity: 0;
      animation: planet-ring-pulse 2.5s ease-out infinite;
    }
    @keyframes planet-ring-pulse {
      0%   { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
      100% { opacity: 0;   transform: translate(-50%,-50%) scale(2.4); }
    }

    /* ── КАРТОЧКА ПЛАНЕТЫ ── */
    .planet-card {
      position: absolute;
      bottom: calc(100% + 18px);
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      background: rgba(8,8,24,0.85);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px;
      backdrop-filter: blur(16px);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      transform: translateX(-50%) translateY(6px);
      white-space: nowrap;
    }
    .planet-dot:hover + .planet-ring + .planet-card,
    .planet-wrap:hover .planet-card {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .card-name {
      font-family: 'Orbitron', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      margin-bottom: 4px;
    }
    .card-sub {
      font-size: 0.6rem;
      opacity: 0.5;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }
    .card-status {
      font-size: 0.6rem;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }
    .card-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
    }
    .card-enter {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      opacity: 0.7;
      text-align: right;
    }
    .card-building {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      opacity: 0.35;
      text-align: center;
    }

    /* ── ПОДСКАЗКА ── */
    .hint {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.55rem;
      letter-spacing: 0.45em;
      color: rgba(255,255,255,0.15);
      z-index: 30;
      animation: hint-fade 4s ease-in-out infinite;
    }
    @keyframes hint-fade {
      0%,100% { opacity: 0.4; } 50% { opacity: 1; }
    }

    /* ── ПЕРЕХОД ── */
    .transition-overlay {
      position: fixed; inset: 0;
      background: radial-gradient(circle at center, #f59e0b 0%, #03030d 80%);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    .transition-overlay.active { opacity: 1; pointer-events: all; }
  </style>
</head>
<body>
  <canvas id="starfield"></canvas>
  <div class="nebula"></div>
  <div class="transition-overlay" id="overlay"></div>

  <div class="scene">
    <div class="solar" id="solar">
      <!-- Короны солнца -->
      <div class="corona corona-3"></div>
      <div class="corona corona-2"></div>
      <div class="corona corona-1"></div>
      <div class="sun-ring"></div>
      <!-- Текст центра -->
      <div class="sun">
        <div class="wyrd-text">WYRD</div>
        <div class="wyrd-sub">КОМАНДНЫЙ ЦЕНТР</div>
      </div>
    </div>
  </div>

  <div class="hint">ВЫБЕРИТЕ НАПРАВЛЕНИЕ</div>

  <script>
  /* ── ЗВЁЗДЫ ── */
  (function() {
    const c = document.getElementById('starfield');
    const ctx = c.getContext('2d');
    let stars = [];

    function resize() {
      c.width = innerWidth; c.height = innerHeight;
      stars = [];
      const n = Math.floor(innerWidth * innerHeight / 2800);
      for (let i = 0; i < n; i++) {
        stars.push({
          x: Math.random() * c.width,
          y: Math.random() * c.height,
          r: Math.random() * 1.4 + 0.2,
          a: Math.random() * 0.8 + 0.1,
          twinkle: Math.random() > 0.85,
          phase: Math.random() * Math.PI * 2,
          speed: Math.random() * 0.5 + 0.3,
        });
      }
    }

    function draw(t) {
      ctx.clearRect(0, 0, c.width, c.height);
      stars.forEach(s => {
        const a = s.twinkle
          ? s.a * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase))
          : s.a;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(draw);
  })();

  /* ── ПЛАНЕТЫ ── */
  const PLANETS = [
    {
      id: 'hq', name: 'HQ', sub: 'Штаб управления',
      desc: 'API · PostgreSQL · Redis · Qdrant',
      color: '#f59e0b', size: 20, orbit: 128, speed: 24, angle: 40,
      url: '/hq', active: true,
    },
    {
      id: 'thomas', name: 'ТОМАС', sub: 'Страж мира',
      desc: 'Telegram · Веб-чат · Память',
      color: '#3b82f6', size: 15, orbit: 222, speed: 40, angle: 115,
      url: '/thomas', active: true,
    },
    {
      id: 'studio', name: 'СТУДИЯ', sub: 'Контент',
      desc: 'Боря · Видео · Пайплайны',
      color: '#8b5cf6', size: 15, orbit: 222, speed: 40, angle: 285,
      url: '/studio', active: true,
    },
    {
      id: 'library', name: 'БИБЛИОТЕКА', sub: 'Знания',
      desc: 'RAG · Векторная база',
      color: '#10b981', size: 12, orbit: 318, speed: 62, angle: 55,
      url: null, active: false,
    },
    {
      id: 'analytics', name: 'АНАЛИТИКА', sub: 'Данные',
      desc: 'Метрики · Отчёты · Паттерны',
      color: '#f97316', size: 12, orbit: 318, speed: 62, angle: 190,
      url: null, active: false,
    },
    {
      id: 'finance', name: 'БУХГАЛТЕРИЯ', sub: 'Деньги',
      desc: 'Расходы · Доходы · Бюджеты',
      color: '#ef4444', size: 12, orbit: 318, speed: 62, angle: 325,
      url: null, active: false,
    },
  ];

  const ORBITS = [128, 222, 318];
  const solar = document.getElementById('solar');
  const overlay = document.getElementById('overlay');

  function lighten(hex, a) {
    const n = parseInt(hex.replace('#',''), 16);
    const r = Math.min(255, (n>>16) + a);
    const g = Math.min(255, ((n>>8)&0xff) + a);
    const b = Math.min(255, (n&0xff) + a);
    return `rgb(${r},${g},${b})`;
  }

  /* Орбитальные кольца */
  ORBITS.forEach(r => {
    const el = document.createElement('div');
    el.className = 'orbit';
    el.style.cssText = `width:${r*2}px;height:${r*2}px;`;
    solar.appendChild(el);
  });

  /* Планеты */
  PLANETS.forEach(p => {
    const wrap = document.createElement('div');
    wrap.className = 'planet-wrap';

    /* Тело */
    const dot = document.createElement('div');
    dot.className = 'planet-dot' + (p.active ? '' : ' inactive');
    dot.style.cssText = `
      width:${p.size}px; height:${p.size}px;
      background: radial-gradient(circle at 35% 30%, ${lighten(p.color, 70)}, ${p.color} 55%, ${p.color}88 100%);
      box-shadow: 0 0 ${p.size}px ${p.color}99, 0 0 ${p.size*2.5}px ${p.color}44, inset 0 0 ${p.size/3}px rgba(255,255,255,0.2);
    `;

    /* Кольцо-пульс (только активные) */
    const ring = document.createElement('div');
    ring.className = 'planet-ring';
    ring.style.cssText = `
      width:${p.size}px; height:${p.size}px;
      color:${p.color};
      ${p.active ? '' : 'display:none'}
    `;

    /* Карточка */
    const card = document.createElement('div');
    card.className = 'planet-card';
    card.style.borderColor = p.color + '33';
    card.innerHTML = `
      <div class="card-name" style="color:${p.color}">${p.name}</div>
      <div class="card-sub">${p.sub}</div>
      <div class="card-status">
        <span class="card-dot" style="background:${p.active ? '#10b981' : '#555'};box-shadow:${p.active ? '0 0 5px #10b981' : 'none'}"></span>
        <span style="color:${p.active ? '#10b981' : '#555'}">${p.active ? 'АКТИВНА' : 'СТРОИТСЯ'}</span>
      </div>
      <div style="font-size:.55rem;color:rgba(255,255,255,0.3);margin-bottom:8px">${p.desc}</div>
      ${p.active
        ? `<div class="card-enter" style="color:${p.color}">ВОЙТИ →</div>`
        : `<div class="card-building">СКОРО</div>`}
    `;

    wrap.appendChild(dot);
    wrap.appendChild(ring);
    wrap.appendChild(card);
    solar.appendChild(wrap);

    if (p.active && p.url) {
      dot.addEventListener('click', () => {
        overlay.style.background = `radial-gradient(circle at center, ${p.color} 0%, #03030d 75%)`;
        overlay.classList.add('active');
        setTimeout(() => { window.location.href = p.url; }, 480);
      });
    }

    p.el = wrap;
  });

  /* Анимация орбит */
  const t0 = performance.now();
  (function frame(now) {
    const elapsed = (now - t0) / 1000;
    PLANETS.forEach(p => {
      if (!p.el) return;
      const rad = (p.angle * Math.PI / 180) + elapsed * (Math.PI * 2 / p.speed);
      const x = Math.cos(rad) * p.orbit;
      const y = Math.sin(rad) * p.orbit;
      p.el.style.transform = `translate(${x}px, ${y}px)`;
    });
    requestAnimationFrame(frame);
  })(t0);
  </script>
</body>
</html>
